name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (Swift + C++)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build --disable-sandbox

      - name: Test
        run: swift test --disable-sandbox

      - name: Smoke test CLI
        run: |
          echo '# Test' > /tmp/test.md
          swift run --disable-sandbox markdownprint-cli /tmp/test.md /tmp/test.pdf --size a4
          test -f /tmp/test.pdf && echo "CLI OK"

      - name: Smoke test CLI (web font)
        run: |
          echo '# Test' > /tmp/test.md
          swift run --disable-sandbox markdownprint-cli /tmp/test.md /tmp/test_web.pdf --font web
          test -f /tmp/test_web.pdf && echo "CLI web OK"

  ios:
    name: iOS (build only)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build MarkdownPrintCore for iOS
        run: |
          swift build --disable-sandbox \
            --sdk iphonesimulator \
            --target arm64-apple-ios16.0-simulator \
            --product MarkdownPrintCore
      - name: Build MarkdownPrint for iOS
        run: |
          swift build --disable-sandbox \
            --sdk iphonesimulator \
            --target arm64-apple-ios16.0-simulator \
            --product MarkdownPrint

  visionos:
    name: visionOS (build only)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build for visionOS Simulator
        run: |
          swift build --disable-sandbox \
            --sdk xrsimulator \
            --target arm64-apple-xros1.0-simulator \
            --product MarkdownPrintCore

  linux:
    name: Linux (C++ core)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build MarkdownPrintCore
        run: swift build --disable-sandbox --target MarkdownPrintCore

      - name: Build CMarkdownPrintCore
        run: swift build --disable-sandbox --target CMarkdownPrintCore
